<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Arithmetic Operations</title>
</head>
<body>

  <h2>JavaScript Arithmetic Operations</h2>

  <script>
    let a = 10;
    let b = 5;

    document.write("Addition: " + (a + b) + "<br>");
    document.write("Subtraction: " + (a - b) + "<br>");
    document.write("Multiplication: " + (a * b) + "<br>");
    document.write("Division: " + (a / b) + "<br>");
  </script>

</body>
</html>
