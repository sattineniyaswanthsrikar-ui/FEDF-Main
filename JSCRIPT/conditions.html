<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Conditions Example</title>
</head>
<body>

  <h2>JavaScript Conditions</h2>

  <script>
    let marks = 75;

    // if, else if, else
    if (marks >= 90) {
      document.write("Grade: A<br>");
    } else if (marks >= 60) {
      document.write("Grade: B<br>");
    } else {
      document.write("Grade: C<br>");
    }

    // Ternary Operator
    let result = (marks >= 40) ? "Pass" : "Fail";
    document.write("Result: " + result);
  </script>

</body>
</html>
